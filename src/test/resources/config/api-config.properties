# API Base Configuration
base.url=https://your-api-server.com
api.version=v1

# Auth Endpoints
auth.endpoint=/api/auth/login
auth.logout.endpoint=/api/auth/logout
auth.refresh.endpoint=/api/auth/refresh

# Test Credentials
test.username=testuser@api.com
